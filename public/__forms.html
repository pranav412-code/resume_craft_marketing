<!-- Static form definitions for Netlify Forms build-time detection.
     Real forms render as React in app/contact + app/feedback; submission
     POSTs to "/" with form-name + URL-encoded fields. -->
<!DOCTYPE html>
<html>
  <head><meta charset="utf-8" /><title>Forms</title></head>
  <body>
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="subject" />
      <textarea name="message"></textarea>
    </form>

    <form name="feedback" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <select name="type">
        <option>bug</option>
        <option>feature</option>
        <option>general</option>
      </select>
      <input type="text" name="rating" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
